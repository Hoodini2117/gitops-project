name: deploy to EKS
on:
  push:
    branches:
      - main
permissions:
  id-token: write
  contents: read
env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: gitops-app
  CLUSTER_NAME: gitops-cluster
  IMAGE_TAG: ${{ github.sha }}
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: configure aws creds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to amazon ecr
        run: |
         aws ecr get-login-password \
         --region $AWS_REGION \
          | docker login \
         --username AWS \
         --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: build docker images
        run: |
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG ./app

      - name: tag image
        run: |
          docker tag $ECR_REPOSITORY:$IMAGE_TAG \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: gitops-app:${{ github.sha }}
          format: table
          exit-code: 0
          ignore-unfixed: true

      - name: push job
        run: |
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Debug variables
        run: |
          echo "Cluster: $CLUSTER_NAME"
      - name: Debug identity
        run: aws sts get-caller-identity
          

      - name: update kubeconfig
        run: |
          aws eks update-kubeconfig \
           --region $AWS_REGION \
           --name $CLUSTER_NAME

      - name: Terraform security scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform
      
      - name: deploy to k8s
        run: |
          kubectl apply -f k8s/



